services:
  bootstrap-node:
    build: ./bootstrap-node
    container_name: bootstrap-node
    ports:
      - "3000:3000"
    networks:
      - pht-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  peer1:
    build: ./peer
    container_name: peer1
    ports:
      - "3001:3001"
    environment:
      PEER_ID: peer1
      PORT: 3001
      SELF_URL: http://peer1:3001
      BOOTSTRAP_URL: http://bootstrap-node:3000
      PEER_LIST: peer1=http://peer1:3001,peer2=http://peer2:3002,peer3=http://peer3:3003,peer4=http://peer4:3004,peer5=http://peer5:3005
      JOIN_DELAY_MS: 1000
    depends_on:
      bootstrap-node:
        condition: service_healthy
    networks:
      - pht-network
    volumes:
      - ./storage/peer1:/app/storage
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  peer2:
